scenes:
  # ─── 1. Brand "Accounting Coach" — 0s → 4s ───────────────────────────────────
  - id: scene-1
    type: brand
    start: 0
    end: 5
    background: gradient-dark
    showBadges: true
    content:
      line1: "Accounting"
      line2: "Coach"
      trademark: true

  # ─── 2. Animated lines — 4s → 10.5s ─────────────────────────────────────────
  - id: scene-2
    type: animated-lines
    start: 6
    end: 13
    background: gradient-dark
    showBadges: true
    content:
      lines:
        - "How to improve your bookkeeping"
        - "skills so you can become more"
        - "confident in the workplace"

  # ─── 3. Congratulations — 11.5s → 17s ────────────────────────────────────────
  - id: scene-3
    type: headline
    start: 13
    end: 21
    background: gradient-teal
    showBadges: true
    content:
      title: "Congratulations!"
      textColor: dark

  # ─── 4. Huge Discount — 17.5s → 32s ─────────────────────────────────────────
  - id: scene-4
    type: headline
    start: 22
    end: 38 
